            sha256: 607669c16a00d6b04bbd284656efbb25bb125a8f842144d29ce4aeff15bc8fe1
          darwin/arm64:
            url: https://github.com/chinese-room-solutions/mass-runtime-gateway-llama-cpp/releases/download/v0.1.0/mass-runtime-gateway-llama-cpp_darwin_arm64.mass
